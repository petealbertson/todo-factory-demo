name: Human Review (smoke test)

on:
  pull_request:
    types: [labeled]

concurrency:
  group: factory-human-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  serve:
    if: github.event.label.name == 'human-review'
    runs-on: [self-hosted, linux, X64]
    timeout-minutes: 10
    steps:
      - name: Run factory
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          cd ~/factory
          bash run.sh human-review "$PR_NUMBER"
