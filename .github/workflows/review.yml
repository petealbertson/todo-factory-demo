name: Review

# Fires when a PR gets `ready-for-review` (from implement or from a fix pass).
# One review pass per invocation. run.sh transitions the label itself:
# 0 findings (or round 3) -> needs-human-review;  else -> fixes-requested.
# Never trigger on push — reviews happen only at explicit state transitions.
on:
  pull_request:
    types: [labeled]

concurrency:
  group: factory-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  review:
    if: github.event.label.name == 'ready-for-review'
    runs-on: [self-hosted, linux, X64]
    timeout-minutes: 25
    steps:
      - name: Run factory
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          cd ~/factory
          bash run.sh review "$PR_NUMBER"