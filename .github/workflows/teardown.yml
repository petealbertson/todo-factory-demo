name: Teardown

on:
  pull_request:
    types: [closed]

jobs:
  teardown:
    runs-on: ubuntu-latest
    steps:
      - name: Tear down PR stage on the worker VM
        env:
          EXEDEV_API_TOKEN: ${{ secrets.EXEDEV_API_TOKEN }}
          FACTORY_VM: ${{ vars.FACTORY_VM }}
        run: |
          curl -sS -X POST https://exe.dev/exec \
            -H "Authorization: Bearer $EXEDEV_API_TOKEN" \
            --data-urlencode "ssh $FACTORY_VM ~/factory/run.sh teardown ${{ github.event.pull_request.number }}"
