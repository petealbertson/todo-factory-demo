name: Factory Dispatch

# Single workflow dispatched by the Fabrica control plane.
# Legacy label-driven workflows still exist during the migration period and
# handle state transitions triggered by labels; this workflow carries the
# run context when the control plane explicitly dispatches a task.
#
# Inputs are passed as strings; the dispatch token is single-use and
# short-lived. The runner exchanges it for the run's callback token at startup.
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Fabrica run id"
        required: true
        type: string
      kind:
        description: "Task kind"
        required: true
        type: choice
        options:
          - triage
          - implement
          - review
          - fix
          - teardown
          - resolve_conflicts
      target:
        description: "Issue or PR number"
        required: true
        type: string
      target_type:
        description: "issue or pr"
        required: true
        type: choice
        options:
          - issue
          - pr
      mode:
        description: "pipeline or point"
        required: true
        type: choice
        options:
          - pipeline
          - point
      round:
        description: "Current review round"
        required: true
        type: string
      max_rounds:
        description: "Maximum review rounds"
        required: true
        type: string
      factory_app_url:
        description: "Fabrica control plane URL"
        required: true
        type: string
      dispatch_token:
        description: "Single-use token to exchange for the callback token"
        required: true
        type: string
      git_author_name:
        description: "Git user.name for brokered commits"
        required: true
        type: string
      git_author_email:
        description: "Git user.email for brokered commits"
        required: true
        type: string

concurrency:
  group: factory-dispatch-${{ github.event.inputs.run_id }}
  cancel-in-progress: false

jobs:
  factory:
    runs-on: [self-hosted, linux, X64]
    timeout-minutes: 30
    steps:
      - name: Dispatch target context
        env:
          FACTORY_RUN_ID: ${{ github.event.inputs.run_id }}
          FACTORY_KIND: ${{ github.event.inputs.kind }}
          FACTORY_TARGET: ${{ github.event.inputs.target }}
          FACTORY_TARGET_TYPE: ${{ github.event.inputs.target_type }}
          FACTORY_MODE: ${{ github.event.inputs.mode }}
          FACTORY_ROUND: ${{ github.event.inputs.round }}
          FACTORY_MAX_ROUNDS: ${{ github.event.inputs.max_rounds }}
          FACTORY_APP_URL: ${{ github.event.inputs.factory_app_url }}
          FACTORY_DISPATCH_TOKEN: ${{ github.event.inputs.dispatch_token }}
          FACTORY_GIT_AUTHOR_NAME: ${{ github.event.inputs.git_author_name }}
          FACTORY_GIT_AUTHOR_EMAIL: ${{ github.event.inputs.git_author_email }}
          GITHUB_ACTIONS: "true"
        run: |
          echo "::add-mask::${FACTORY_DISPATCH_TOKEN}"
          cd ~/factory

          # --- auto-update: pull latest factory-config, self-test, rollback on failure ---
          # Workers pull the latest main before every dispatch, so they never run stale
          # code. If the new code fails the self-test, the worker rolls back to the
          # last-known-good SHA and proceeds with that — a broken push to main cannot
          # brick a worker. git pull output is masked off (may contain token-bearing
          # URLs if origin was rewritten by factory_configure_github_token earlier,
          # though it is not at this point).
          OLD_SHA="$(git rev-parse HEAD)"
          if git fetch origin main 2>/dev/null && git merge --ff-only origin/main 2>/dev/null; then
            NEW_SHA="$(git rev-parse HEAD)"
            if [ "$OLD_SHA" != "$NEW_SHA" ]; then
              echo "factory-config updated: ${OLD_SHA:0:7} -> ${NEW_SHA:0:7}"
              if ! bash run.sh selftest; then
                echo "::warning::new factory-config failed self-test; rolling back to ${OLD_SHA:0:7}"
                git reset --hard "$OLD_SHA"
              else
                echo "factory-config self-test passed"
              fi
            fi
          else
            echo "::warning::could not fetch/merge factory-config; running current HEAD (${OLD_SHA:0:7})"
          fi

          bash run.sh
